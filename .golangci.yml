version: "2"

linters:
  default: none
  enable:
    - errcheck       # unchecked errors
    - govet          # go vet checks
    - ineffassign    # unused assignments
    - staticcheck    # static analysis (includes gosimple + unused)
    - misspell       # spelling in comments/strings
    - noctx          # http requests without context
    - bodyclose      # unclosed http response bodies
    - exhaustive     # missing switch cases on enums
  exclusions:
    rules:
      # Test files get a bit more latitude
      - path: _test\.go
        linters: [errcheck]

formatters:
  enable:
    - gofmt          # formatting
    - goimports      # import ordering
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - gitte
